name: Python Signup Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test-signup:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install only needed packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest selenium

      # Run signup tests
      - name: Run signup tests
        run: |
          python -m unittest discover -s tests/signup
