steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Upgrade pip and clear pip cache
    run: |
      python -m pip install --upgrade pip
      pip cache purge || true

  - name: Install numpy and pandas (fixed ABI) and other dependencies
    run: |
      python -m pip install --no-cache-dir numpy==1.26.4
      python -m pip install --no-cache-dir pandas==2.2.2
      python -m pip install --no-cache-dir -r requirements.txt

  - name: Run auth unit tests only
    run: python -m unittest tests/test_auth.py