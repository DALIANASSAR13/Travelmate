name: General Project Workflow

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  issues:
  issue_comment:
  pull_request_review:
  release:
  workflow_dispatch:

jobs:
  general-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v3

      - name: Display Event Info
        run: |
          echo "A new event occurred in the project!"
          echo "Event name: ${{ github.event_name }}"
          echo "Triggered by: ${{ github.actor }}"
